name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  lint:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run dotnet format
        run: dotnet format --verify-no-changes

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Build
        run: dotnet build CFCHub.sln --no-incremental -warnaserror

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Run Unit Tests
        run: dotnet test tests/CFCHub.UnitTests --collect:"XPlat Code Coverage" --results-directory ./coverage
        
      - name: Report Coverage with ReportGenerator
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator -reports:"coverage/**/coverage.cobertura.xml" -targetdir:"coveragereport" -reporttypes:"Html;Cobertura" -assemblyfilters:"+CFCHub.Domain"
          
      - name: Enforce 90% Coverage Gate on Domain
        run: |
          COVERAGE_RATE=$(grep -oP '(?<=<coverage line-rate=")[0-9.]+' coveragereport/Cobertura.xml | head -n 1 || true)
          if [ -z "$COVERAGE_RATE" ]; then
            echo "Could not find coverage line-rate in report. Assuming coverage is missing or failed."
            exit 1
          fi
          
          COVERAGE_PERCENT=$(awk "BEGIN {print $COVERAGE_RATE * 100}")
          echo "CFCHub.Domain line coverage is $COVERAGE_PERCENT%"
          
          if awk "BEGIN {exit !($COVERAGE_PERCENT < 90)}"; then
            echo "Coverage is below 90%. Failing the build."
            exit 1
          fi

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: cfchub
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Run Integration Tests
        run: dotnet test tests/CFCHub.IntegrationTests
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=cfchub;Username=postgres;Password=password"
          ConnectionStrings__Redis: "localhost:6379"

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps

      - name: Start Application Stack
        run: docker compose up -d
        env:
          POSTGRES_PASSWORD: password
          CFCHUB_DB_CONNECTION_STRING: "Host=postgres;Port=5432;Database=cfchub;Username=cfchub;Password=password"
          CFCHUB_REDIS_CONNECTION_STRING: "redis:6379"
          CFCHUB_AWS_REGION: "us-east-1"
          CFCHUB_S3_DOCUMENTS_BUCKET: "cfchub-local-documents"
          CFCHUB_S3_MEDICAL_BUCKET: "cfchub-local-medical"
          CFCHUB_SES_FROM_ADDRESS: "no-reply@cfchub.local"
          CFCHUB_JWT_PRIVATE_KEY_ARN: "local-arn"
          CFCHUB_DATA_PROTECTION_KEY_PREFIX: "cfchub-keys"

      - name: Wait for API to be ready
        run: |
          timeout 30 bash -c 'until curl -s http://localhost:5000/api/v1/public/cfc/health > /dev/null; do sleep 1; done'

      - name: Run Playwright tests
        working-directory: ./frontend
        run: npm run e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
